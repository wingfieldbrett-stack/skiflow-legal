<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkiFlow — Real-time ski resort traffic</title>
  <meta name="description" content="SkiFlow shows you live crowd density on every trail and lift line at your favorite ski resort." />
  <style>
    :root {
      --bg: #0a1126;
      --fg: #e9ecf2;
      --muted: #98a4ba;
      --accent: #62a6ff;
      --card: #131a33;
      --border: #2a3556;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--fg);
      background: linear-gradient(180deg, #0a1126 0%, #0f1936 100%);
      min-height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    .brand {
      display: inline-block;
      font-weight: 800;
      font-size: 24px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 48px;
    }
    h1 {
      font-size: 44px;
      line-height: 1.15;
      margin: 0 0 16px;
      font-weight: 700;
    }
    .lede {
      font-size: 19px;
      color: var(--muted);
      max-width: 580px;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 48px;
    }
    .links a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.15s ease;
    }
    .links a:hover { border-color: var(--accent); }
    .links a.primary {
      background: var(--accent);
      color: #0a1126;
      border-color: var(--accent);
    }
    .links a.primary:hover { filter: brightness(1.05); }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }
    footer a { color: var(--muted); }
    @media (max-width: 540px) {
      h1 { font-size: 32px; }
      .lede { font-size: 17px; }
    }
  </style>
</head>
<body>

<div class="container">

  <a class="brand" href="./">SkiFlow</a>

  <h1>Real-time ski resort traffic.</h1>
  <p class="lede">A live, anonymous heatmap of crowd density on every trail and lift line at your favorite resort. Coming soon to Android.</p>

  <div class="links">
    <a class="primary" href="./privacy.html">Privacy Policy</a>
    <a href="mailto:wingfieldbrett@gmail.com">Contact</a>
  </div>

  <footer>
    &copy; 2026 SkiFlow. Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors.
  </footer>

</div>

</body>
</html>
